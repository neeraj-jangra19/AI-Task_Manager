<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FocusFlow — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24;
            --border: rgba(255,255,255,0.07);
            --text: #e8e8f0; --muted: #5a5a72; --accent: #00e5ff;
            --focused: #00e5ff; --tired: #fbbf24; --distracted: #f43f5e;
            --easy: #4ade80; --medium: #fbbf24; --hard: #f43f5e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; padding:0; }

        .bg-grid {
            position:fixed; inset:0; z-index:0;
            background-image: linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);
            background-size:40px 40px; pointer-events:none;
        }

        header {
            position:relative; z-index:10;
            display:flex; align-items:center; justify-content:space-between;
            padding:18px 36px; border-bottom:1px solid var(--border);
        }
        .logo { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; }
        .logo span { color:var(--accent); }
        .back-link { color:var(--muted); text-decoration:none; font-size:12px; letter-spacing:0.5px; transition:color 0.2s; }
        .back-link:hover { color:var(--accent); }

        .dash-body { position:relative; z-index:1; padding:28px 36px; }
        .dash-title { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; margin-bottom:6px; }
        .dash-sub { color:var(--muted); font-size:12px; letter-spacing:1px; margin-bottom:32px; }

        .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
        .stat-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:12px; padding:20px;
        }
        .stat-label { font-size:9px; letter-spacing:2px; color:var(--muted); margin-bottom:8px; }
        .stat-value { font-family:'Syne',sans-serif; font-size:30px; font-weight:800; color:var(--accent); }
        .stat-sub { font-size:11px; color:var(--muted); margin-top:4px; }

        .charts-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:28px; }
        .chart-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:12px; padding:24px;
        }
        .chart-title { font-size:10px; letter-spacing:2px; color:var(--muted); margin-bottom:20px; }

        .history-card {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:12px; padding:24px;
        }
        .history-title { font-size:10px; letter-spacing:2px; color:var(--muted); margin-bottom:16px; }
        .history-row {
            display:grid; grid-template-columns:160px 100px 1fr 100px;
            gap:12px; padding:10px 0; border-bottom:1px solid var(--border);
            font-size:12px; align-items:center;
        }
        .history-row:last-child { border-bottom:none; }
        .history-header { color:var(--muted); font-size:10px; letter-spacing:1px; }
        .state-badge {
            display:inline-block; padding:2px 10px; border-radius:20px;
            font-size:10px; letter-spacing:1px; text-transform:uppercase;
        }
        .state-badge.focused    { background:rgba(0,229,255,0.1);  color:var(--focused); }
        .state-badge.tired      { background:rgba(251,191,36,0.1); color:var(--tired); }
        .state-badge.distracted { background:rgba(244,63,94,0.1);  color:var(--distracted); }
        .state-badge.unknown    { background:rgba(107,114,128,0.1);color:var(--muted); }
        .diff-badge {
            display:inline-block; padding:2px 10px; border-radius:4px;
            font-size:10px; text-transform:uppercase; letter-spacing:1px;
        }
        .diff-badge.easy   { background:rgba(74,222,128,0.1); color:var(--easy); }
        .diff-badge.medium { background:rgba(251,191,36,0.1); color:var(--medium); }
        .diff-badge.hard   { background:rgba(244,63,94,0.1);  color:var(--hard); }
        .no-data { color:var(--muted); font-size:13px; text-align:center; padding:40px; }
    </style>
</head>
<body>
<div class="bg-grid"></div>

<header>
    <div class="logo">AI-Task_Manager<span>.</span></div>
    <a href="index.html" class="back-link">← Back to App</a>
</header>

<div class="dash-body">
    <div class="dash-title">Productivity Dashboard</div>
    <div class="dash-sub">YOUR FOCUS PATTERNS OVER TIME</div>

    
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">TOTAL SESSIONS</div>
            <div class="stat-value" id="statTotal">—</div>
            <div class="stat-sub">analyses run</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">FOCUSED TIME</div>
            <div class="stat-value" id="statFocused" style="color:var(--focused)">—</div>
            <div class="stat-sub">of sessions</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">TIRED SESSIONS</div>
            <div class="stat-value" id="statTired" style="color:var(--tired)">—</div>
            <div class="stat-sub">detected</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">DISTRACTED</div>
            <div class="stat-value" id="statDistracted" style="color:var(--distracted)">—</div>
            <div class="stat-sub">sessions</div>
        </div>
    </div>

    <!-- Charts -->
    <div class="charts-row">
        <div class="chart-card">
            <div class="chart-title">STATE DISTRIBUTION</div>
            <canvas id="pieChart" height="200"></canvas>
        </div>
        <div class="chart-card">
            <div class="chart-title">SESSION TIMELINE</div>
            <canvas id="lineChart" height="200"></canvas>
        </div>
    </div>

    <!-- History table -->
    <div class="history-card">
        <div class="history-title">RECENT SESSIONS</div>
        <div id="historyTable"></div>
    </div>
</div>

<script>
const API = "https://ai-task-manager-q7t6.onrender.com";

const STATE_NUM = { focused: 1, tired: 0.5, distracted: 0, unknown: 0 };

async function loadDashboard() {
    const res  = await fetch(`${API}/history`).catch(() => null);
    if (!res) { document.querySelector('.dash-sub').textContent = "Cannot connect to backend."; return; }
    const data = await res.json();

    if (!data.length) {
        document.getElementById("historyTable").innerHTML = '<div class="no-data">No sessions yet. Use the app first!</div>';
        return;
    }

    // Stats
    const total = data.length;
    const focused = data.filter(d => d.state === "focused").length;
    const tired = data.filter(d => d.state === "tired").length;
    const distracted = data.filter(d => d.state === "distracted").length;

    document.getElementById("statTotal").textContent = total;
    document.getElementById("statFocused").textContent = Math.round(focused/total*100) + "%";
    document.getElementById("statTired").textContent = tired;
    document.getElementById("statDistracted").textContent = distracted;

    // Pie chart
    new Chart(document.getElementById("pieChart"), {
        type: "doughnut",
        data: {
            labels: ["Focused", "Tired", "Distracted", "Unknown"],
            datasets: [{
                data: [focused, tired, distracted, total - focused - tired - distracted],
                backgroundColor: ["rgba(0,229,255,0.7)","rgba(251,191,36,0.7)","rgba(244,63,94,0.7)","rgba(107,114,128,0.4)"],
                borderWidth: 0
            }]
        },
        options: {
            plugins: { legend: { labels: { color: "#e8e8f0", font: { family: "DM Mono", size: 11 } } } },
            cutout: "60%"
        }
    });

    // Line chart 
    const recent = data.slice(-20);
    new Chart(document.getElementById("lineChart"), {
        type: "line",
        data: {
            labels: recent.map((_, i) => i + 1),
            datasets: [{
                label: "Focus Level",
                data: recent.map(d => STATE_NUM[d.state] ?? 0),
                borderColor: "#00e5ff",
                backgroundColor: "rgba(0,229,255,0.08)",
                tension: 0.4, fill: true,
                pointBackgroundColor: recent.map(d =>
                    d.state === "focused" ? "#00e5ff" :
                    d.state === "tired"   ? "#fbbf24" :
                    d.state === "distracted" ? "#f43f5e" : "#6b7280"
                ),
                pointRadius: 5
            }]
        },
        options: {
            scales: {
                x: { ticks: { color:"#5a5a72" }, grid: { color:"rgba(255,255,255,0.04)" } },
                y: {
                    ticks: {
                        color:"#5a5a72",
                        callback: v => v === 1 ? "Focused" : v === 0.5 ? "Tired" : "Distracted"
                    },
                    grid: { color:"rgba(255,255,255,0.04)" },
                    min: 0, max: 1
                }
            },
            plugins: { legend: { display: false } }
        }
    });

    // History table
    const table = document.getElementById("historyTable");
    table.innerHTML = `
        <div class="history-row history-header">
            <span>TIMESTAMP</span><span>STATE</span><span>SUGGESTED TASK</span><span>DIFFICULTY</span>
        </div>
    `;

    data.slice().reverse().slice(0, 30).forEach(row => {
        const div = document.createElement("div");
        div.className = "history-row";
        div.innerHTML = `
            <span style="color:var(--muted)">${row.timestamp || "—"}</span>
            <span><span class="state-badge ${row.state}">${row.state}</span></span>
            <span style="font-size:12px">${row.suggested_task || "—"}</span>
            <span>${row.difficulty ? `<span class="diff-badge ${row.difficulty}">${row.difficulty}</span>` : "—"}</span>
        `;
        table.appendChild(div);
    });
}

loadDashboard();
</script>
</body>
</html>
